<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard | ResQPaws</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="cssfiles/userstyle.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="paw" aria-hidden="true">&#128062;</span>
      <h1><span class="brand-dark">ResQ</span><span class="brand-accent">Paws</span></h1>
    </div>
    <nav class="nav-links" aria-label="User navigation">
      <a href="user.html#reports">My Reports</a>
      <a href="about.html">Profile</a>
      <a href="login.html" id="logoutLink">Logout</a>
    </nav>
  </header>

  <main class="dashboard">
    <section class="feed">
      <div class="feed-header" id="reports">
        <h2>Report Feed</h2>
        <p>View and track your reported animals.</p>
      </div>
      <article class="main-card" id="latestReportCard" aria-live="polite"></article>
      <section class="mini-grid" id="reportList" aria-live="polite"></section>
    </section>

    <aside class="sidebar">
      <button class="report-btn" id="reportNewBtn" type="button">+ Report New Animal</button>

      <section class="panel">
        <h3>My Reports</h3>
        <div class="stat"><span class="icon">&#128203;</span><strong id="totalReports">0</strong> <span>Total Reports</span></div>
        <div class="stat"><span class="icon">&#9989;</span><strong id="rescuedReports">0</strong> <span>Rescued</span></div>
        <div class="stat"><span class="icon">&#9203;</span><strong id="pendingReports">0</strong> <span>Pending</span></div>
      </section>

      <section class="panel">
        <h3>Quick Links</h3>
        <a class="quick-link" href="ngo.html">&#128203; My Active Cases</a>
        <a class="quick-link" href="user.html#reports">&#9989; Track Reports</a>
      </section>
    </aside>
  </main>
  <p id="userToast" class="toast" aria-live="polite"></p>
  <script src="js/app-state.js"></script>
  <script src="js/user.js"></script>
</body>
</html>
