<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQPaws Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="cssfiles/loginstyle.css" />
    <script src="js/back-button.js"></script>
</head>
<body>
  <button type="button" class="back-btn" onclick="goBack()">← Back</button>
  <main class="page">
    <header class="brand-wrap" aria-label="ResQPaws branding">
      <span class="brand-mark" aria-hidden="true">&#128062;</span>
      <h1 class="brand-name"><span class="brand-dark">ResQ</span><span class="brand-accent">Paws</span></h1>
    </header>

    <section class="welcome">
      <h2>Welcome Back</h2>
      <p>Login to continue</p>
    </section>

    <section class="login-card" aria-label="Login form card">
      <div class="role-tabs" role="tablist" aria-label="Select login role">
        <button class="role-tab active" id="userTab" data-role="user" type="button" role="tab" aria-selected="true">
          <span class="role-icon" aria-hidden="true">&#128100;</span>
          User
        </button>
        <button class="role-tab" id="ngoTab" data-role="ngo" type="button" role="tab" aria-selected="false">
          <span class="role-icon" aria-hidden="true">&#127970;</span>
          NGO / Volunteer
        </button>
      </div>

      <p class="partner-note"><span aria-hidden="true">&#9679;</span> Authorized partners only</p>

      <form class="form" id="loginForm" action="#" method="post">
        <label class="field" aria-label="Email input">
          <span class="field-icon" aria-hidden="true">&#9993;</span>
          <input type="email" name="email" placeholder="Enter your email" autocomplete="email" required />
        </label>

        <label class="field" aria-label="Password input">
          <span class="field-icon" aria-hidden="true">&#128274;</span>
          <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
        </label>

        <a href="forgot-password.html" class="forgot">Forgot password?</a>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <p class="divider"><span>or</span></p>

      <p class="signup-text">Don&apos;t have an account?</p>
      <a href="create-account.html" class="signup-link">Create Account</a>
    </section>
  </main>

  <p class="toast" id="toast" aria-live="polite"></p>
  <script type="module" src="js/app-state.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
