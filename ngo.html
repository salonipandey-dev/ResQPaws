<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NGO Dashboard | ResQPaws</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="cssfiles/ngostyle.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="paw" aria-hidden="true">&#128062;</span>
      <h1><span class="brand-dark">ResQ</span><span class="brand-accent">Paws</span></h1>
    </div>
    <nav class="nav-links" aria-label="NGO dashboard navigation">
      <a class="active" href="#" data-nav="dashboard">Dashboard</a>
      <a href="#" data-nav="active">Active Cases</a>
      <a href="#" data-nav="completed">Completed</a>
      <a href="#" data-nav="analytics">Analytics</a>
      <a href="login.html" id="ngoLogout">Logout</a>
    </nav>
  </header>

  <main class="dashboard">
    <section class="head">
      <h2>NGO / Volunteer Dashboard</h2>
      <p>Manage and respond to reported animal cases.</p>
    </section>

    <nav class="tabs" aria-label="Case filters">
      <a class="active" href="#" data-filter="all">All Cases</a>
      <a href="#" data-filter="urgent">Urgent</a>
      <a href="#" data-filter="nearby">Nearby Only</a>
      <a href="#" data-filter="completed">Completed</a>
    </nav>

    <section class="content-grid">
      <section class="cases-grid">
        <article class="case-card case-large" id="featuredCase"></article>
        <div id="caseList"></div>
      </section>

      <aside class="side-panel">
        <section class="panel">
          <h4>Quick Links</h4>
          <a href="ngo.html">&#128203; My Active Cases</a>
          <a href="user.html">&#9989; Track Reports</a>
          <a href="login.html">&#128682; Logout</a>
        </section>
      </aside>
    </section>
  </main>
  <p id="ngoToast" class="toast" aria-live="polite"></p>
  <script type="module" src="js/app-state.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/ngo.js"></script>
</body>
</html>
