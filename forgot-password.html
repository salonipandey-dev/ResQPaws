<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | ResQPaws</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="cssfiles/forgotpasswordstyle.css" />
</head>
<body>
  <main class="page">
    <header class="brand-wrap" aria-label="ResQPaws branding">
      <span class="brand-mark" aria-hidden="true">&#128062;</span>
      <h1 class="brand-name"><span class="brand-dark">ResQ</span><span class="brand-accent">Paws</span></h1>
    </header>

    <section class="welcome">
      <h2>Reset Password</h2>
      <p>Use your authorized registered email to reset account password.</p>
    </section>

    <section class="card">
      <form id="requestForm" class="form" novalidate>
        <h3>Step 1: Verify Email</h3>
        <label class="field">
          <span>Registered Email</span>
          <input id="resetEmail" type="email" placeholder="Enter your registered email" autocomplete="email" required />
        </label>
        <button type="submit" class="btn-primary">Send Reset Code</button>
      </form>

      <form id="resetForm" class="form hidden" novalidate>
        <h3>Step 2: Confirm OTP and New Password</h3>
        <label class="field">
          <span>6-digit OTP</span>
          <input id="otpInput" type="text" inputmode="numeric" maxlength="6" placeholder="Enter OTP code" required />
        </label>
        <label class="field">
          <span>New Password</span>
          <input id="newPassword" type="password" placeholder="Enter new password" autocomplete="new-password" required />
        </label>
        <label class="field">
          <span>Confirm New Password</span>
          <input id="confirmNewPassword" type="password" placeholder="Confirm new password" autocomplete="new-password" required />
        </label>
        <button type="submit" class="btn-primary">Reset Password</button>
      </form>

      <p class="help" id="helperText">We will send a verification code to your registered email.</p>
      <p class="links"><a href="login.html">Back to Login</a></p>
    </section>
  </main>

  <p class="toast" id="toast" aria-live="polite"></p>
  <script type="module" src="js/app-state.js"></script>
  <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
